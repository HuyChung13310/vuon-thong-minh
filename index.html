<!DOCTYPE html>
<html>

<head>
<title>Vườn thông minh</title>

<style>

body{
font-family: Arial;
background:#f0f2f5;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

.card{
width:180px;
padding:20px;
border-radius:10px;
color:white;
font-size:20px;
}

.temp{background:#ff4d4d;}
.humi{background:#3498db;}
.light{background:#f39c12;}

</style>

</head>

<body>

<h1>🌱 VƯỜN THÔNG MINH</h1>

<div class="container">

<div class="card temp">
🌡 Nhiệt độ
<br><span id="temp">--</span> °C
</div>

<div class="card humi">
💧 Độ ẩm đất
<br><span id="soil">--</span> %
</div>

<div class="card light">
☀️ Ánh sáng
<br><span id="light">--</span>
</div>

</div>

<script>

async function getData(){

let soil = await fetch("https://io.adafruit.com/api/v2/HuyChung/feeds/do-am/data/last");
let soilData = await soil.json();

document.getElementById("soil").innerText = soilData.value;

let light = await fetch("https://io.adafruit.com/api/v2/HuyChung/feeds/anh-sang/data/last");
let lightData = await light.json();

document.getElementById("light").innerText = lightData.value;

}

setInterval(getData,5000)

</script>

</body>

</html>
