<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vườn Thông Minh</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

h1{
margin-top:40px;
}

.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
}

.card{
width:220px;
padding:25px;
border-radius:12px;
color:white;
font-size:22px;
}

.temp{background:#ff4d4d;}
.soil{background:#3c8dbc;}
.light{background:#f39c12;}

.value{
font-size:32px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>🌱 VƯỜN THÔNG MINH</h1>

<div class="container">

<div class="card temp">
🌡 Nhiệt độ
<div class="value" id="temp">--</div>
</div>

<div class="card soil">
💧 Độ ẩm đất
<div class="value" id="soil">--</div>
</div>

<div class="card light">
☀ Ánh sáng
<div class="value" id="light">--</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
